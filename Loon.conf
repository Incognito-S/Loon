# =====================================
# Remote Filter
# (?i)：表示后面整个括号内的表达式不区分大小写
# =====================================
[Remote Filter]
HK_Filter = NameRegex, FilterKey = "(?=.*(?i)(港|Hong Kong|🇭🇰))(?!.*(?i)Premium).*$"
SG_Filter = NameRegex, FilterKey = "(?=.*(?i)(坡|Singapore|🇸🇬))(?!.*(?i)Premium).*$"
JP_Filter = NameRegex, FilterKey = "(?=.*(?i)(日|Japan|🇯🇵))(?!.*(?i)Premium).*$"
TW_Filter = NameRegex, FilterKey = "(?=.*(?i)(台|Taiwan|🇹🇼))(?!.*(?i)Premium).*$"
US_Filter = NameRegex, FilterKey = "(?=.*(?i)(美|USA|United States|🇺🇸))(?!.*(?i)Premium).*$"
EU_Filter = NameRegex, FilterKey = "(?=.*(?i)(英|United Kingdom|德|Germany|法|France))(?!.*(?i)Premium).*$"
OT_Filter = NameRegex, FilterKey = "^(?!.*(?i)(港|hong.?kong|坡|singapore|日|japan|tokyo|osaka|台|taiwan|taipei|美|america|united.?states|los.?angeles|san.?jose|silicon|new.?york|seattle|英|united.?kingdom|london|德|germany|frankfurt|法|france|paris)).*$"


# =====================================
# Rule
# Options:no-resolve(only for cidr)
# =====================================
[Rule]
# 信息收集
URL-REGEX,\.log\.,REJECT
# 兜底策略
FINAL,Final


